{% extends 'base.html' %}

{% block title %}Sign Up - LifeLink Blood Donor Finder{% endblock %}

{% block content %}
<section class="section" style="display: flex; align-items: center; justify-content: center; min-height: 70vh;">
    <div class="container" style="display: flex; justify-content: center;">
        <div class="form-container form-auth">
            <div class="form-title">
                <h2>Create Account</h2>
                <p>Register with your email to become a donor or raise blood requests.</p>
            </div>

            <form action="{{ url_for('register') }}" method="POST">
                <!-- Email -->
                <div class="form-group" style="margin-bottom: 20px;">
                    <label for="email">Email Address <span style="color: var(--primary);">*</span></label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="johndoe@example.com" required autofocus>
                </div>

                <!-- Password -->
                <div class="form-group" style="margin-bottom: 20px;">
                    <label for="password">Password <span style="color: var(--primary);">*</span></label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="Minimum 6 characters" minlength="6" required>
                </div>

                <!-- Confirm Password -->
                <div class="form-group" style="margin-bottom: 30px;">
                    <label for="confirm_password">Confirm Password <span style="color: var(--primary);">*</span></label>
                    <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="Confirm your password" minlength="6" required>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 20px;"><i class="fas fa-user-plus"></i> Create Account</button>

                <p style="text-align: center; font-size: 14px; color: var(--text-secondary);">
                    Already have an account? <a href="{{ url_for('login') }}" style="color: var(--primary); font-weight: 600;">Log In</a>
                </p>
            </form>
        </div>
    </div>
</section>
{% endblock %}
